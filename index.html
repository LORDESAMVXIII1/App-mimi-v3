function bindCreatePost() {
  var closeBtn = appEl.querySelector("[data-close-create]");
  var submitBtn = appEl.querySelector("[data-submit-post]");
  var textarea = appEl.querySelector("[data-post-text]");
  var charCount = appEl.querySelector("[data-char-count]");
  var fileInput = appEl.querySelector("[data-create-file-input]");

  if (textarea) {
    textarea.focus();
    var updateCount = function() {
      var remaining = 280 - textarea.value.length;
      if (charCount) {
        charCount.textContent = remaining;
        charCount.style.color = remaining < 40 ? "#e0507a" : "var(--muted)";
      }
      if (submitBtn) submitBtn.style.opacity = textarea.value.trim() ? "1" : "0.5";
    };
    textarea.addEventListener("input", updateCount);
    updateCount();
  }

  appEl.querySelectorAll("[data-pick-media]").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var kind = btn.getAttribute("data-pick-media");
      if (!fileInput) return;
      fileInput.setAttribute("accept", kind === "video" ? "video/*" : "image/*");
      fileInput.setAttribute("capture", "environment");
      fileInput.setAttribute("data-kind", kind);
      fileInput.click();
    });
  });
  if (fileInput) {
    fileInput.addEventListener("change", function() {
      var file = fileInput.files[0];
      if (!file) return;
      var kind = fileInput.getAttribute("data-kind");
      var reader = new FileReader();
      reader.onload = function() {
        compose.media = reader.result;
        compose.mediaType = kind;
        render();
        var ta = appEl.querySelector("[data-post-text]");
        if (ta) ta.focus();
      };
      reader.readAsDataURL(file);
    });
  }
  var removeMediaBtn = appEl.querySelector("[data-remove-media]");
  if (removeMediaBtn) removeMediaBtn.addEventListener("click", function() {
    compose.media = null; compose.mediaType = null; render();
  });

  var pickLocBtn = appEl.querySelector("[data-pick-loc]");
  if (pickLocBtn) pickLocBtn.addEventListener("click", function() {
    if (!navigator.geolocation) { showToast("Localização não disponível neste dispositivo."); return; }
    showToast("Obtendo localização…");
    navigator.geolocation.getCurrentPosition(function(pos) {
      var lat = pos.coords.latitude.toFixed(4);
      var lon = pos.coords.longitude.toFixed(4);
      compose.loc = lat + ", " + lon;
      render();
    }, function() {
      showToast("Não foi possível obter sua localização. Verifique a permissão.");
    }, { timeout:10000 });
  });
  var removeLocBtn = appEl.querySelector("[data-remove-loc]");
  if (removeLocBtn) removeLocBtn.addEventListener("click", function() { compose.loc = null; render(); });

  var emojiBtn = appEl.querySelector("[data-pick-emoji]");
  if (emojiBtn) emojiBtn.addEventListener("click", function() { toggleEmojiPanel("create"); });

  if (submitBtn) {
    submitBtn.addEventListener("click", function() {
      var ta = appEl.querySelector("[data-post-text]");
      var text = ta ? ta.value.trim() : "";
      if (!text && !compose.media) return;
      var newPost = {
        id:"p_"+uid(), authorId:ME_ID, text:text,
        img: compose.mediaType === "image" ? compose.media : null,
        video: compose.mediaType === "video" ? compose.media : null,
        loc: compose.loc,
        likedBy:[], saved:false, time:"agora",
      };
      posts.unshift(newPost);
      FB.createPost(newPost);
      state.creating = false;
      state.page = "feed";
      state.viewProfileId = null;
      state.postDetailId = null;
      compose = { media:null, mediaType:null, loc:null };
      render();
      window.scrollTo(0,0);
      showToast("Publicado! 🎀");
    });
  }
  if (closeBtn) closeBtn.addEventListener("click", function() {
    state.creating = false;
    compose = { media:null, mediaType:null, loc:null };
    render();
  });
}

function renderAuthPage() {
  var googleSvg = '<svg width="18" height="18" viewBox="0 0 24 24">' +
    '<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>' +
    '<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>' +
    '<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>' +
    '<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>' +
  '</svg>';

  return '<div class="auth-screen">' +
    '<div class="auth-logo-wrap">' +
      '<div class="auth-logo">'+icoSvg("heartLogo",36,"#fff",true)+'</div>' +
      '<h1 class="display auth-title">MIMI</h1>' +
      '<p class="auth-sub">Conecte-se com o mundo 🎀</p>' +
    '</div>' +
    '<div class="auth-card">' +
      '<div class="auth-tabs">' +
        '<button class="auth-tab '+(authMode==="login"?"active":"")+'" data-mode="login">Entrar</button>' +
        '<button class="auth-tab '+(authMode==="register"?"active":"")+'" data-mode="register">Cadastrar</button>' +
      '</div>' +
      '<div class="auth-fields">' +
        (authMode==="register" ? '<input class="input" placeholder="Nome completo" data-field="name">' : "") +
        '<input class="input" type="email" placeholder="Email" data-field="email">' +
        '<input class="input" type="password" placeholder="Senha" data-field="pw">' +
        (authMode==="login" ? '<span class="auth-forgot">Esqueceu a senha?</span>' : "") +
        '<button class="auth-submit" data-submit-auth>'+(authMode==="login"?"Entrar":"Criar conta")+'</button>' +
        '<div class="auth-divider"><div class="auth-divider-line"></div><span>ou</span><div class="auth-divider-line"></div></div>' +
        '<button class="auth-google" data-google-auth>'+googleSvg+' Continuar com Google</button>' +
      '</div>' +
    '</div>' +
    '<p class="auth-terms">Ao entrar, você aceita os Termos e a Política de Privacidade.</p>' +
  '</div>';
}

function bindAuthPage() {
  appEl.querySelectorAll("[data-mode]").forEach(function(btn) {
    btn.addEventListener("click", function() { authMode = btn.getAttribute("data-mode"); render(); });
  });
  var submitBtn = appEl.querySelector("[data-submit-auth]");
  if (submitBtn) submitBtn.addEventListener("click", function() {
    var emailEl = appEl.querySelector('[data-field="email"]');
    var pwEl = appEl.querySelector('[data-field="pw"]');
    var nameEl = appEl.querySelector('[data-field="name"]');
    var email = emailEl ? emailEl.value.trim() : "";
    var pw    = pwEl    ? pwEl.value          : "";
    var name  = nameEl  ? nameEl.value.trim() : "";
    if (!email || !pw) { showToast("Preencha email e senha."); return; }
    submitBtn.textContent = "Aguarde…";
    submitBtn.disabled = true;
    submitBtn.style.opacity = ".7";
    var p = authMode === "login"
      ? FB.login(email, pw)
      : FB.register(email, pw, name);
    p.then(function(u) {
      if (u) {
        state.user = u;
        render();
        FB._checkRules();
        FB.loadConvos().then(function(){ render(); checkOnlineStatus(CONVOS); }).catch(function(){});
        startPresence();
        // Carrega notifs existentes e inicia polling
        FB.loadNotifs().then(function(docs) {
          docs.forEach(function(doc) {
            if (NOTIFS.find(function(n){ return n._fsId === doc._id; })) return;
            NOTIFS.push({
              id: uid(), _fsId: doc._id,
              type: doc.type || "like",
              userId: doc.fromUid || "",
              _fromName: doc.fromName || "",
              _fromAvatar: doc.fromAvatar || "",
              text: doc.text || "",
              time: doc.createdAt ? _relTime(doc.createdAt) : "antes",
              read: !!doc.read,
            });
            if (doc.fromUid && !USERS[doc.fromUid] && doc.fromName) {
              USERS[doc.fromUid] = {
                uid: doc.fromUid, name: doc.fromName,
                username: "@" + doc.fromName.toLowerCase().replace(/\s+/g,""),
                avatar: doc.fromAvatar || "https://api.dicebear.com/7.x/avataaars/svg?seed="+doc.fromUid,
                verified:false, followers:[], following:[],
              };
            }
          });
          _lastNotifCheck = new Date().toISOString();
          render();
        }).catch(function(){});
        startNotifPolling();
      }
    }).catch(function() {
      submitBtn.textContent = authMode === "login" ? "Entrar" : "Criar conta";
      submitBtn.disabled = false;
      submitBtn.style.opacity = "1";
    });
  });
  var googleBtn = appEl.querySelector("[data-google-auth]");
  if (googleBtn) googleBtn.addEventListener("click", function() {
    FB.loginGoogle().catch(function(){});
  });

  // "Esqueceu a senha?"
  var forgotEl = appEl.querySelector(".auth-forgot");
  if (forgotEl) forgotEl.addEventListener("click", function() {
    var emailEl = appEl.querySelector('[data-field="email"]');
    var email = emailEl ? emailEl.value.trim() : "";
    if (!email) { showToast("Digite seu email primeiro."); return; }
    fetch(FIRE_AUTH+":sendOobCode?key="+CFG.apiKey, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ requestType:"PASSWORD_RESET", email:email })
    }).then(function(r){ return r.json(); }).then(function(d){
      if (d.error) showToast("Erro: " + d.error.message);
      else showToast("Email de redefinição enviado! Verifique sua caixa.");
    });
  });
}

// ─── SESSÃO PERSISTENTE ──────────────────────────────────────────
(function restoreSession() {
  try {
    var saved = localStorage.getItem("mimi_session");
    if (!saved) { render(); return; }
    var sess = JSON.parse(saved);
    if (!sess.idToken || !sess.uid) { render(); return; }
    // Valida o token com o Firebase antes de usar
    fetch(FIRE_AUTH+":lookup?key="+CFG.apiKey, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ idToken: sess.idToken })
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.error || !d.users || !d.users[0]) {
        localStorage.removeItem("mimi_session");
        render(); return;
      }
      _idToken = sess.idToken;
      _fbUid   = sess.uid;
      return FB._loadOrCreateUser(sess.uid, d.users[0].email, d.users[0].displayName||"");
    })
    .then(function(u){
      if (u) {
        state.user = u;
        render();
        FB.loadConvos().then(function(){ render(); checkOnlineStatus(CONVOS); }).catch(function(){});
        startPresence();
        FB.loadNotifs().then(function(docs) {
          docs.forEach(function(doc) {
            if (NOTIFS.find(function(n){ return n._fsId === doc._id; })) return;
            NOTIFS.push({
              id: uid(), _fsId: doc._id,
              type: doc.type || "like",
              userId: doc.fromUid || "",
              _fromName: doc.fromName || "",
              _fromAvatar: doc.fromAvatar || "",
              text: doc.text || "",
              time: doc.createdAt ? _relTime(doc.createdAt) : "antes",
              read: !!doc.read,
            });
            if (doc.fromUid && !USERS[doc.fromUid] && doc.fromName) {
              USERS[doc.fromUid] = {
                uid: doc.fromUid, name: doc.fromName,
                username: "@" + doc.fromName.toLowerCase().replace(/\s+/g,""),
                avatar: doc.fromAvatar || "https://api.dicebear.com/7.x/avataaars/svg?seed="+doc.fromUid,
                verified:false, followers:[], following:[],
              };
            }
          });
          _lastNotifCheck = new Date().toISOString();
          render();
        }).catch(function(){});
        startNotifPolling();
      }
    })
    .catch(function(){ render(); });
  } catch(e) { render(); }
})();

// ─── INIT ─────────────────────────────────────────────────────
</script>
