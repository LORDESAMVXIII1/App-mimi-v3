<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>MIMI</title>
<meta name="theme-color" content="#ff6fa5" />
<style>
  :root{
    --bg:#fff5f8; --surface:#ffffff; --card:#ffffff; --border:#ffe0ec;
    --accent:#ff6fa5; --accentL:#ffa6c9; --pink:#ff4d8d; --green:#5fd9a4;
    --text:#4a3b45; --sub:#b08a9c; --muted:#e3b8cc;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; background:var(--bg); overscroll-behavior-y: none; height:100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color:var(--text);
  }
  .display { font-weight:800; letter-spacing:-0.5px; }
  ::-webkit-scrollbar { display:none; }
  input, textarea, button { font-family: inherit; }
  button { -webkit-user-select:none; user-select:none; }
  #app { min-height: 100vh; max-width:480px; margin:0 auto; position:relative; background:var(--bg); }
  img, video { -webkit-user-drag:none; }
  .row { display:flex; align-items:center; }
  .grow { flex:1; }
  .icon-btn { background:none; border:none; cursor:pointer; padding:4px; display:flex; align-items:center; }
  .scroll-x { display:flex; overflow-x:auto; scrollbar-width:none; }
  .hidden { display:none !important; }
  .fade-in { animation: fadeIn .15s ease; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

  .btn { border-radius:16px; cursor:pointer; padding:11px 20px; font-size:14px; font-weight:700; display:flex; align-items:center; justify-content:center; gap:6px; border:none; }
  .btn-sm { padding:7px 14px; font-size:13px; }
  .btn-full { width:100%; }
  .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accentL)); color:#fff; box-shadow:0 4px 14px rgba(255,111,165,.35); }
  .btn-secondary { background:var(--bg); color:var(--sub); border:1px solid var(--border); }
  .btn-danger { background:#fff0f0; color:#e0507a; border:1px solid #ffd3df; }

  .input { background:var(--bg); border:1px solid var(--border); border-radius:14px; padding:12px 14px; color:var(--text); font-size:14px; outline:none; width:100%; }
  .avatar { border-radius:50%; object-fit:cover; background:var(--surface); display:block; flex-shrink:0; }
  .avatar-ring { border:1.5px solid var(--border); }
  .avatar-ring-accent { border:2.5px solid var(--accent); }

  .page-header { padding:14px 16px 10px; background:var(--bg); position:sticky; top:0; z-index:10; border-bottom:1px solid var(--border); }
  .bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:var(--surface); border-top:1px solid var(--border); display:flex; z-index:100; padding-bottom:env(safe-area-inset-bottom); box-shadow:0 -4px 16px rgba(255,111,165,.08); }
  .nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:10px 4px 8px; background:none; border:none; cursor:pointer; color:var(--muted); position:relative; }
  .nav-btn.active { color:var(--accent); }
  .nav-label { font-size:10px; font-weight:500; }
  .nav-btn.active .nav-label { font-weight:700; }
  .nav-badge { position:absolute; top:6px; right:calc(50% - 18px); background:var(--accent); color:#fff; font-size:10px; font-weight:700; border-radius:20px; min-width:17px; height:17px; display:flex; align-items:center; justify-content:center; padding:0 4px; border:2px solid var(--surface); }

  .stories-wrap { display:flex; gap:12px; overflow-x:auto; padding:4px 16px 8px; scrollbar-width:none; }
  .story { display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; flex-shrink:0; }
  .story-ring { padding:2.5px; border-radius:50%; background:var(--muted); }
  .story-ring.unseen { background:linear-gradient(135deg,var(--accent),var(--accentL),#ffd6e8); }
  .story-ring-inner { padding:2px; border-radius:50%; background:var(--bg); }
  .story-name { font-size:11px; color:var(--sub); max-width:62px; text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .story-name.seen { color:var(--muted); }
  .story-plus { margin-top:-20px; margin-left:38px; position:relative; background:var(--accent); border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; border:2px solid var(--bg); }

  .post-card { background:var(--card); border-bottom:1px solid var(--border); }
  .post-head { display:flex; align-items:center; gap:10px; padding:12px 14px 8px; }
  .post-name { font-weight:700; font-size:14px; color:var(--text); }
  .post-meta { display:flex; gap:6px; align-items:center; }
  .post-sub { font-size:12px; color:var(--muted); }
  .post-text { padding:0 14px 10px; margin:0; font-size:14.5px; line-height:1.6; white-space:pre-wrap; }
  .post-img { width:100%; max-height:420px; object-fit:cover; display:block; }
  .post-video { width:100%; max-height:420px; display:block; background:#000; }
  .post-loc { display:flex; align-items:center; gap:5px; padding:0 14px 10px; font-size:12.5px; color:var(--accent); font-weight:600; }
  .post-actions { display:flex; align-items:center; padding:6px 8px 2px; }
  .act-btn { background:none; border:none; cursor:pointer; display:flex; align-items:center; gap:5px; padding:8px 10px; font-size:13px; font-weight:600; border-radius:10px; color:var(--sub); }
  .act-btn.liked { color:var(--pink); }
  .act-btn.saved { color:var(--accent); }
  .comments-box { padding:8px 14px 14px; border-top:1px solid var(--border); }
  .comment-row { display:flex; gap:8px; margin-bottom:10px; }
  .comment-bubble { background:var(--bg); border-radius:14px; padding:7px 12px; flex:1; }
  .comment-user { font-weight:700; font-size:13px; }
  .comment-time { font-size:12px; color:var(--muted); }
  .comment-text { margin:3px 0 0; font-size:13px; color:var(--sub); }
  .comment-input-row { display:flex; gap:8px; margin-top:6px; align-items:center; }
  .comment-input { flex:1; background:var(--bg); border:none; border-radius:20px; padding:8px 14px; color:var(--text); font-size:13px; outline:none; }
  .comment-send { background:var(--accent); border:none; border-radius:50%; width:36px; height:36px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

  .search-box { position:relative; }
  .search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); }
  .search-input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:10px 14px 10px 38px; color:var(--text); font-size:14px; outline:none; }
  .chip-row { display:flex; gap:8px; padding:12px 16px; overflow-x:auto; scrollbar-width:none; }
  .chip { padding:7px 16px; border-radius:20px; border:1px solid var(--border); cursor:pointer; flex-shrink:0; background:var(--surface); color:var(--sub); font-size:13px; font-weight:600; }
  .chip.active { background:var(--accent); color:#fff; border:none; }
  .trend-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
  .trend-cat { font-size:11px; color:var(--muted); }
  .trend-tag { font-weight:700; font-size:14px; }
  .explore-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:3px; padding:0 2px; }
  .explore-cell { aspect-ratio:1; overflow:hidden; border-radius:8px; }
  .explore-cell img { width:100%; height:100%; object-fit:cover; display:block; }

  .notif-row { display:flex; gap:12px; align-items:center; padding:14px 16px; border-bottom:1px solid var(--border); }
  .notif-row.unread { background:#fff0f6; }
  .notif-badge { position:absolute; bottom:-2px; right:-2px; border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; border:2px solid var(--bg); }
  .notif-dot { width:8px; height:8px; background:var(--accent); border-radius:50%; flex-shrink:0; }

  .convo-row { display:flex; gap:12px; align-items:center; padding:13px 16px; border-bottom:1px solid var(--border); cursor:pointer; }
  .convo-name-row { display:flex; justify-content:space-between; }
  .convo-last { margin:0; font-size:13px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .convo-last.unread { color:var(--sub); font-weight:600; }
  .convo-unread-badge { background:var(--accent); color:#fff; font-size:11px; font-weight:700; border-radius:20px; padding:2px 7px; min-width:20px; text-align:center; }

  .chat-header { display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:1px solid var(--border); background:var(--bg); position:sticky; top:0; z-index:5; }
  .chat-msgs { flex:1; overflow:auto; padding:16px 14px; display:flex; flex-direction:column; gap:10px; }
  .bubble-row { display:flex; }
  .bubble-row.me { justify-content:flex-end; }
  .bubble { border-radius:18px; padding:9px 14px; max-width:75%; font-size:14px; line-height:1.5; }
  .bubble.me { background:linear-gradient(135deg,var(--accent),var(--accentL)); color:#fff; }
  .bubble.them { background:var(--surface); border:1px solid var(--border); color:var(--text); }
  .bubble-time { font-size:10px; margin-top:3px; text-align:right; }
  .bubble-img { max-width:220px; border-radius:14px; display:block; margin-bottom:2px; }
  .bubble-video { max-width:220px; border-radius:14px; display:block; margin-bottom:2px; }
  .bubble.media { padding:6px; background:transparent !important; border:none !important; }
  .audio-msg { display:flex; align-items:center; gap:8px; min-width:170px; }
  .audio-play-btn { width:30px; height:30px; border-radius:50%; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .audio-wave { flex:1; height:20px; display:flex; align-items:center; gap:2px; }
  .audio-wave span { width:2.5px; border-radius:2px; display:inline-block; }
  .chat-input-row { padding:10px 14px; border-top:1px solid var(--border); display:flex; gap:8px; padding-bottom:calc(10px + env(safe-area-inset-bottom)); align-items:center; position:relative; }
  .chat-input { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:22px; padding:11px 16px; color:var(--text); font-size:14px; outline:none; min-width:0; }
  .chat-send { background:linear-gradient(135deg,var(--accent),var(--accentL)); border:none; border-radius:50%; width:44px; height:44px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .chat-tool-btn { background:none; border:none; cursor:pointer; color:var(--accent); padding:6px; display:flex; align-items:center; flex-shrink:0; }
  .rec-indicator { position:absolute; inset:0; background:var(--surface); display:flex; align-items:center; gap:10px; padding:0 14px; }
  .rec-dot { width:10px; height:10px; border-radius:50%; background:#e0507a; animation:pulse 1s infinite; }

  .profile-cover { height:150px; background:linear-gradient(135deg,#ffd6e8,var(--accent),var(--accentL)); position:relative; }
  .profile-cover-btn { position:absolute; top:12px; right:12px; background:rgba(255,255,255,.35); border:none; border-radius:10px; padding:7px 12px; color:#fff; cursor:pointer; font-size:13px; font-weight:600; }
  .profile-info { padding:0 16px 16px; background:var(--surface); border-bottom:1px solid var(--border); }
  .profile-top-row { display:flex; justify-content:space-between; align-items:flex-end; margin-top:-36px; }
  .profile-avatar-wrap { padding:3px; background:var(--surface); border-radius:50%; }
  .profile-actions { display:flex; gap:8px; padding-top:50px; }
  .profile-name-row { display:flex; align-items:center; gap:5px; margin-bottom:2px; }
  .profile-username { font-size:13px; color:var(--muted); margin-bottom:8px; }
  .profile-bio { font-size:14px; color:var(--sub); line-height:1.6; margin:0 0 10px; }
  .profile-meta-row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
  .profile-meta-item { display:flex; gap:4px; align-items:center; }
  .profile-meta-item span { font-size:12px; color:var(--muted); }
  .profile-stats { display:flex; gap:24px; }
  .profile-stat-num { font-weight:800; font-size:17px; }
  .profile-stat-label { font-size:12px; color:var(--muted); }
  .profile-tabs { display:flex; border-bottom:1px solid var(--border); background:var(--bg); position:sticky; top:0; z-index:5; }
  .profile-tab { flex:1; padding:13px 4px; border:none; background:none; cursor:pointer; color:var(--muted); font-weight:500; font-size:13px; border-bottom:2px solid transparent; text-transform:capitalize; }
  .profile-tab.active { color:var(--accent); font-weight:700; border-bottom:2px solid var(--accent); }

  .auth-screen { min-height:100vh; background:linear-gradient(180deg,#fff5f8,#ffeaf2); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
  .auth-logo-wrap { text-align:center; margin-bottom:36px; }
  .auth-logo { width:72px; height:72px; border-radius:24px; background:linear-gradient(135deg,var(--accent),var(--accentL)); display:flex; align-items:center; justify-content:center; margin:0 auto 14px; box-shadow:0 8px 20px rgba(255,111,165,.35); }
  .auth-title { font-size:38px; margin:0; letter-spacing:-1px; }
  .auth-sub { color:var(--sub); margin-top:6px; font-size:15px; }
  .auth-card { width:100%; max-width:400px; background:var(--surface); border-radius:28px; padding:24px; border:1px solid var(--border); box-shadow:0 10px 30px rgba(255,111,165,.12); }
  .auth-tabs { display:flex; gap:4px; background:var(--bg); border-radius:16px; padding:4px; margin-bottom:22px; }
  .auth-tab { flex:1; padding:10px; border-radius:12px; border:none; cursor:pointer; background:transparent; color:var(--muted); font-weight:700; font-size:14px; }
  .auth-tab.active { background:var(--accent); color:#fff; }
  .auth-fields { display:flex; flex-direction:column; gap:12px; }
  .auth-forgot { font-size:13px; color:var(--accent); text-align:right; cursor:pointer; font-weight:600; }
  .auth-submit { background:linear-gradient(135deg,var(--accent),var(--accentL)); border:none; border-radius:16px; padding:13px; color:#fff; font-weight:800; font-size:15px; cursor:pointer; box-shadow:0 6px 16px rgba(255,111,165,.35); }
  .auth-divider { display:flex; align-items:center; gap:12px; margin:2px 0; }
  .auth-divider-line { flex:1; height:1px; background:var(--border); }
  .auth-divider span { font-size:13px; color:var(--muted); }
  .auth-google { background:var(--bg); border:1px solid var(--border); border-radius:16px; padding:12px; color:var(--text); font-weight:600; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; }
  .auth-terms { text-align:center; font-size:12px; color:var(--muted); margin-top:20px; opacity:.8; }

  .create-overlay { position:fixed; inset:0; background:var(--bg); z-index:200; display:flex; flex-direction:column; max-width:480px; margin:0 auto; }
  .create-header { display:flex; align-items:center; justify-content:space-between; padding:16px 16px 12px; border-bottom:1px solid var(--border); }
  .create-body { flex:1; overflow:auto; padding:16px; }
  .create-textarea { width:100%; background:transparent; border:none; color:var(--text); font-size:16px; resize:none; outline:none; font-family:inherit; min-height:120px; line-height:1.6; }
  .create-preview-wrap { position:relative; margin-top:10px; border-radius:16px; overflow:hidden; }
  .create-preview-wrap img, .create-preview-wrap video { width:100%; max-height:320px; object-fit:cover; display:block; background:#000; }
  .create-remove-media { position:absolute; top:8px; right:8px; background:rgba(0,0,0,.55); border:none; border-radius:50%; width:30px; height:30px; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .create-loc-chip { margin-top:10px; display:inline-flex; align-items:center; gap:6px; background:#fff0f6; color:var(--accent); padding:7px 12px; border-radius:20px; font-size:13px; font-weight:600; }
  .create-loc-remove { background:none; border:none; color:var(--accent); cursor:pointer; padding:0; margin-left:4px; display:flex; }
  .create-toolbar { display:flex; padding:12px 16px; border-top:1px solid var(--border); padding-bottom:calc(12px + env(safe-area-inset-bottom)); align-items:center; }
  .create-tool-btn { background:none; border:none; cursor:pointer; color:var(--accent); padding:8px 14px; border-radius:10px; display:flex; align-items:center; position:relative; }
  .char-count { font-size:13px; color:var(--muted); margin-left:auto; }

  .emoji-panel { position:absolute; bottom:100%; left:0; right:0; background:var(--surface); border:1px solid var(--border); border-radius:16px 16px 0 0; box-shadow:0 -6px 20px rgba(0,0,0,.08); padding:10px; z-index:50; max-height:220px; overflow-y:auto; }
  .emoji-grid { display:grid; grid-template-columns:repeat(8,1fr); gap:4px; }
  .emoji-grid button { background:none; border:none; font-size:22px; cursor:pointer; padding:5px; border-radius:8px; line-height:1; }

  .story-viewer { position:fixed; inset:0; background:#000; z-index:300; display:flex; flex-direction:column; max-width:480px; margin:0 auto; }
  .story-viewer-bar { position:absolute; top:8px; left:8px; right:8px; height:3px; background:rgba(255,255,255,.3); border-radius:3px; z-index:2; overflow:hidden; }
  .story-viewer-bar-fill { height:100%; background:#fff; width:0%; }
  .story-viewer-head { position:absolute; top:18px; left:12px; right:12px; display:flex; align-items:center; gap:8px; z-index:2; }
  .story-viewer-media { flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .story-viewer-media img, .story-viewer-media video { width:100%; height:100%; object-fit:contain; }
  .story-add-fab { position:absolute; bottom:24px; left:50%; transform:translateX(-50%); background:rgba(255,255,255,.2); border:2px solid #fff; border-radius:50%; width:54px; height:54px; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:2; }

  .call-screen { position:fixed; inset:0; background:linear-gradient(180deg,#2a1a30,#4a1f3d); z-index:400; display:flex; flex-direction:column; align-items:center; justify-content:space-between; max-width:480px; margin:0 auto; color:#fff; padding:50px 24px 40px; }
  .call-status { text-align:center; margin-top:30px; }
  .call-name { font-size:24px; font-weight:700; margin:0 0 6px; }
  .call-sub { font-size:14px; opacity:.75; margin:0; }
  .call-avatar-wrap { display:flex; flex-direction:column; align-items:center; gap:18px; }
  .call-controls { display:flex; gap:28px; align-items:center; }
  .call-ctrl-btn { width:58px; height:58px; border-radius:50%; border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; background:rgba(255,255,255,.15); color:#fff; }
  .call-ctrl-btn.active { background:#fff; color:#2a1a30; }
  .call-end-btn { width:64px; height:64px; border-radius:50%; border:none; background:#e0507a; color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; transform:rotate(135deg); }

  .toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:rgba(74,59,69,.92); color:#fff; padding:10px 18px; border-radius:20px; font-size:13px; font-weight:600; z-index:500; max-width:80%; text-align:center; }

  /* ── typing indicator ──────────────────────────────────────── */
  .typing-indicator { display:flex; align-items:center; gap:4px; padding:10px 14px; }
  .typing-dot { width:7px; height:7px; border-radius:50%; background:var(--muted); animation: typingBounce 1.2s infinite ease-in-out; }
  .typing-dot:nth-child(2) { animation-delay:.2s; }
  .typing-dot:nth-child(3) { animation-delay:.4s; }
  @keyframes typingBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  /* ── follow list ───────────────────────────────────────── */
  .follow-row { display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid var(--border); cursor:pointer; }
  .follow-row-info { flex:1; min-width:0; }
  .follow-row-name { font-weight:700; font-size:14px; display:flex; align-items:center; gap:4px; }
  .follow-row-username { font-size:12.5px; color:var(--muted); }
  .follow-btn { padding:7px 16px; border-radius:14px; font-size:12.5px; font-weight:700; cursor:pointer; border:none; flex-shrink:0; }
  .follow-btn.following { background:var(--bg); color:var(--sub); border:1px solid var(--border); }
  .follow-btn.not-following { background:linear-gradient(135deg,var(--accent),var(--accentL)); color:#fff; }

  /* ── post detail (focused) ─────────────────────────────── */
  .post-detail-header { display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid var(--border); background:var(--bg); position:sticky; top:0; z-index:10; }

  /* ── action sheet (3-dot menu) ─────────────────────────── */
  .sheet-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:350; display:flex; align-items:flex-end; max-width:480px; margin:0 auto; }
  .sheet-panel { background:var(--surface); border-radius:20px 20px 0 0; width:100%; padding:8px 0 calc(8px + env(safe-area-inset-bottom)); animation: sheetUp .18s ease; }
  @keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .sheet-item { display:flex; align-items:center; gap:14px; padding:15px 20px; font-size:15px; font-weight:600; cursor:pointer; color:var(--text); }
  .sheet-item.danger { color:#e0507a; }
  .sheet-cancel { display:flex; align-items:center; justify-content:center; padding:15px 20px; font-size:15px; font-weight:700; color:var(--sub); cursor:pointer; border-top:1px solid var(--border); margin-top:6px; }

  /* ── confirm dialog ─────────────────────────────────────── */

// ── helpers Firestore ─────────────────────────────────────────
function fsValue(val) {
  if (val === null || val === undefined) return { nullValue: null };
  if (typeof val === "boolean")  return { booleanValue: val };
  if (typeof val === "number")   return Number.isInteger(val) ? { integerValue: String(val) } : { doubleValue: val };
  if (typeof val === "string")   return { stringValue: val };
  if (Array.isArray(val))        return { arrayValue: { values: val.map(fsValue) } };
  if (typeof val === "object")   return { mapValue: { fields: fsObj(val) } };
  return { stringValue: String(val) };
}
function fsObj(obj) {
  var fields = {};
  Object.keys(obj).forEach(function(k) { fields[k] = fsValue(obj[k]); });
  return fields;
}
function fsRead(val) {
  if (!val) return null;
  if ("nullValue"    in val) return null;
  if ("booleanValue" in val) return val.booleanValue;
  if ("integerValue" in val) return parseInt(val.integerValue, 10);
  if ("doubleValue"  in val) return val.doubleValue;
  if ("stringValue"  in val) return val.stringValue;
  if ("arrayValue"   in val) return (val.arrayValue.values||[]).map(fsRead);
  if ("mapValue"     in val) {
    var out = {};
    var f = val.mapValue.fields || {};
    Object.keys(f).forEach(function(k){ out[k] = fsRead(f[k]); });
    return out;
  }
  return null;
}
function fsDocToObj(doc) {
  var out = {};
  var fields = doc.fields || {};
  Object.keys(fields).forEach(function(k){ out[k] = fsRead(fields[k]); });
  // extrai o id do nome do documento
  var nameParts = (doc.name||"").split("/");
  out._id = nameParts[nameParts.length-1];
  return out;
}

function fsGet(path) {
  return fetch(FIRE_DB+"/"+path, { headers: authHeaders() })
    .then(function(r){ return r.json(); })
    .then(function(d){ return d.fields ? fsDocToObj(d) : null; });
}
function fsList(collection) {
  return fetch(FIRE_DB+"/"+collection+"?pageSize=200", { headers: authHeaders() })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (!d.documents) return [];
      return d.documents.map(fsDocToObj);
    });
}
function fsQuery(collection, field, op, value) {
  // Usa runQuery para filtrar no servidor (suporta array-contains, ==, etc)
  var url = FIRE_DB+":runQuery";
  var body = {
    structuredQuery: {
      from: [{ collectionId: collection }],
      where: {
        fieldFilter: {
          field: { fieldPath: field },
          op: op,
          value: fsValue(value)
        }
      }
    }
  };
  return fetch(url, { method:"POST", headers: authHeaders(), body: JSON.stringify(body) })
    .then(function(r){ return r.json(); })
    .then(function(arr){
      if (!Array.isArray(arr)) return [];
      return arr.filter(function(x){ return x.document; }).map(function(x){ return fsDocToObj(x.document); });
    });
}
function fsSet(path, data, merge) {
  var url = FIRE_DB+"/"+path;
  // Se merge=true, usa updateMask para não apagar outros campos
  if (merge !== false) {
    var keys = Object.keys(data);
    if (keys.length > 0) {
      url += "?" + keys.map(function(k){ return "updateMask.fieldPaths="+encodeURIComponent(k); }).join("&");
    }
  }
  return fetch(url, {
    method:"PATCH", headers: authHeaders(),
    body: JSON.stringify({ fields: fsObj(data) })
  }).then(function(r){ return r.json(); });
}
function fsAdd(collection, data) {
  return fetch(FIRE_DB+"/"+collection, {
    method:"POST", headers: authHeaders(),
    body: JSON.stringify({ fields: fsObj(data) })
  }).then(function(r){ return r.json(); });
}
function fsDelete(path) {
  return fetch(FIRE_DB+"/"+path, { method:"DELETE", headers: authHeaders() });
}

// ── PRESENÇA ONLINE ──────────────────────────────────────────
var _presenceInterval = null;

function startPresence() {
  if (!_idToken || !_fbUid) return;
  // Marca online agora
  fsSet("users/"+_fbUid, { online: true, lastSeen: new Date().toISOString() });
  // Atualiza a cada 30s
  clearInterval(_presenceInterval);
  _presenceInterval = setInterval(function() {
    if (!_idToken || !_fbUid) { clearInterval(_presenceInterval); return; }
    fsSet("users/"+_fbUid, { online: true, lastSeen: new Date().toISOString() });
  }, 30000);
  // Ao fechar/sair marca offline
  window.addEventListener("beforeunload", function() {
    fsSet("users/"+_fbUid, { online: false, lastSeen: new Date().toISOString() });
  });
}

function checkOnlineStatus(convos) {
  // Para cada conversa, verifica o status online do outro utilizador
  convos.forEach(function(conv) {
    if (!conv.userId) return;
    fsGet("users/"+conv.userId).then(function(u) {
      if (!u) return;
      var wasOnline = conv.online;
      // Online se lastSeen < 2 minutos atrás
      var online = false;
      if (u.online === true && u.lastSeen) {
        var diff = (Date.now() - new Date(u.lastSeen).getTime()) / 1000;
        online = diff < 120;
      }
      conv.online = online;
      if (wasOnline !== online) render();
    }).catch(function(){});
  });
}

// ── POLLING DE NOTIFICAÇÕES (a cada 12s) ─────────────────────
var _notifPollInterval = null;
var _lastNotifCheck = null; // ISO string da última checagem

function startNotifPolling() {
  stopNotifPolling();
  if (!_idToken || !_fbUid) return;
  _lastNotifCheck = new Date().toISOString();

  _notifPollInterval = setInterval(function() {
    if (!_idToken || !_fbUid) { stopNotifPolling(); return; }
    FB.loadNotifs().then(function(docs) {
      if (!docs || !docs.length) return;
      var changed = false;
      docs.forEach(function(doc) {
        // Evita duplicatas: checa pelo _id do Firestore
        var exists = NOTIFS.find(function(n){ return n._fsId === doc._id; });
        if (exists) return;
        // Só processa notificações após o login
        if (doc.createdAt && _lastNotifCheck && doc.createdAt < _lastNotifCheck) {
          // notif antiga — só adiciona à lista sem toast/badge animado
          NOTIFS.push({
            id:       uid(),
            _fsId:    doc._id,
            type:     doc.type     || "like",
            userId:   doc.fromUid  || "",
            _fromName:doc.fromName || "",
            _fromAvatar: doc.fromAvatar || "",
            text:     doc.text     || "",
            time:     doc.createdAt ? _relTime(doc.createdAt) : "antes",
            read:     !!doc.read,
          });
          changed = true;
          return;
        }
        // notif nova — adiciona e dispara alerta
        var n = {
          id:        uid(),
          _fsId:     doc._id,
          type:      doc.type     || "like",
          userId:    doc.fromUid  || "",
          _fromName: doc.fromName || "",
          _fromAvatar: doc.fromAvatar || "",
          text:      doc.text     || "",
          time:      "agora",
          read:      false,
        };
        NOTIFS.unshift(n);
        changed = true;

        // Preenche USERS se não tiver
        if (doc.fromUid && !USERS[doc.fromUid] && doc.fromName) {
          USERS[doc.fromUid] = {
            uid:      doc.fromUid,
            name:     doc.fromName,
            username: "@" + doc.fromName.toLowerCase().replace(/\s+/g,""),
            avatar:   doc.fromAvatar || "https://api.dicebear.com/7.x/avataaars/svg?seed="+doc.fromUid,
            verified: false, followers:[], following:[],
          };
        }

        // Toast + badge
        showToast("🔔 " + (doc.fromName||"Alguém") + " " + (doc.text||""));
        var badge = document.querySelector(".nav-btn[data-nav='notifs'] .nav-badge");
        var unread = NOTIFS.filter(function(x){ return !x.read; }).length;
        if (badge) {
          badge.textContent = unread;
        } else {
          var navBtn = document.querySelector(".nav-btn[data-nav='notifs']");
          if (navBtn) {
            var b = document.createElement("div");
            b.className = "nav-badge";
            b.textContent = unread;
            navBtn.appendChild(b);
          }
        }
      });
      _lastNotifCheck = new Date().toISOString();
      if (changed && state.page === "notifs") render();
    }).catch(function(){});
  }, 12000);
}

function stopNotifPolling() {
  if (_notifPollInterval) { clearInterval(_notifPollInterval); _notifPollInterval = null; }
}

function _relTime(iso) {
  try {
    var diff = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
    if (diff < 60)  return diff + "s";
    if (diff < 3600) return Math.floor(diff/60) + "m";
    if (diff < 86400) return Math.floor(diff/3600) + "h";
    return Math.floor(diff/86400) + "d";
  } catch(e) { return "antes"; }
}

var state = {
  user: null,
  page: "feed",
  creating: false,
  exploreCat: "Tudo",
  activeConvoId: null,
  emojiTarget: null,
  viewingStoryIdx: null,    // index into combined story-owner list
  viewingStoryItemIdx: 0,   // which item within that owner's story array
  viewProfileId: null,      // if set, render this user's profile instead of own (pushed view)
  profileStack: [],         // navigation stack of viewProfileId values, for back button
  followListFor: null,      // {userId, kind:'followers'|'following'} or null
  postDetailId: null,       // post id being viewed in focused/detail mode
  actionSheetPostId: null,  // post id whose 3-dot menu is open
  confirmDialog: null,      // {title, text, confirmLabel, onConfirm} or null
  editProfileOpen: false,
  searchQuery: "",
  replyTarget: null,        // {pid, commentId, authorName} when replying to a comment
  userSearchOpen: false,
  userSearchQuery: "",
  userSearchResults: [],
};

var compose = { media:null, mediaType:null, loc:null };
var activeCall = null;
var callTimerInterval = null;
var _typingTimeout = null;
var _isTyping = false;

var mediaRecorder = null;
var recordedChunks = [];
var recordingStream = null;
var recordingStartTime = null;

var appEl = document.getElementById("app");

function render() {
  if (!state.user) {
    appEl.innerHTML = renderAuthPage();
    bindAuthPage();
    return;
  }
  meRefresh();

  var unreadNotifs = NOTIFS.filter(function(n){ return !n.read; }).length;
  var unreadMsgs = CONVOS.reduce(function(a,c){ return a + c.unread; }, 0);

  var pageHtml = "";
  var showBottomNav = true;

  if (state.postDetailId) {
    pageHtml = renderPostDetailPage();
    showBottomNav = false;
  } else if (state.viewProfileId) {
    pageHtml = renderProfilePage(state.viewProfileId);
    showBottomNav = false;
  } else if (state.page === "feed") pageHtml = renderFeedPage();
  else if (state.page === "explore") pageHtml = renderExplorePage();
  else if (state.page === "notifs") pageHtml = renderNotifsPage();
  else if (state.page === "msgs") pageHtml = renderMsgsPage();
  else if (state.page === "profile") pageHtml = renderProfilePage(ME_ID);

  var html = '<div style="padding-bottom:'+(showBottomNav?72:0)+'px;">' + pageHtml + '</div>';
  if (showBottomNav) html += renderBottomNav(unreadNotifs, unreadMsgs);

  if (state.followListFor) html += renderFollowListPage();
  if (state.creating) html += renderCreatePost();
  if (state.editProfileOpen) html += renderEditProfile();
  if (state.viewingStoryIdx !== null) html += renderStoryViewer();
  if (activeCall) html += renderCallScreen();
  if (state.actionSheetPostId) html += renderActionSheet();
  if (state.confirmDialog) html += renderConfirmDialog();

  appEl.innerHTML = html;
  bindGlobalHandlers();

  if (state.postDetailId) bindPostDetailPage();
  else if (state.viewProfileId) bindProfilePage(state.viewProfileId);
  else if (state.page === "feed") bindFeedPage();
  else if (state.page === "explore") bindExplorePage();
  else if (state.page === "notifs") bindNotifsPage();
  else if (state.page === "msgs") bindMsgsPage();
  else if (state.page === "profile") bindProfilePage(ME_ID);

  if (state.followListFor) bindFollowListPage();
  if (state.creating) bindCreatePost();
  if (state.editProfileOpen) bindEditProfile();
  if (state.viewingStoryIdx !== null) bindStoryViewer();
  if (activeCall) bindCallScreen();
  if (state.actionSheetPostId) bindActionSheet();
  if (state.confirmDialog) bindConfirmDialog();
}

function openProfile(userId) {
  state.viewProfileId = userId;
  state.followListFor = null;
  window.scrollTo(0,0);
  render();
}
function closeProfile() {
  state.viewProfileId = null;
  render();
}
function openPostDetail(pid) {
  state.postDetailId = pid;
  window.scrollTo(0,0);
  render();
}
function closePostDetail() {
  state.postDetailId = null;
  render();
}

// ─── BOTTOM NAV ──────────────────────────────────────────────
function renderBottomNav(unreadNotifs, unreadMsgs) {
  var tabs = [
    { id:"feed",    icon:"home",  label:"Início" },
    { id:"explore", icon:"search",label:"Explorar" },
    { id:"notifs",  icon:"bell",  label:"Notif", badge:unreadNotifs },
    { id:"msgs",    icon:"msg",   label:"Msgs",  badge:unreadMsgs },
    { id:"profile", icon:"user",  label:"Perfil" },
  ];
  var html = '<div class="bottom-nav">';
  tabs.forEach(function(t) {
    var active = state.page === t.id;
    html += '<button class="nav-btn '+(active?"active":"")+'" data-nav="'+t.id+'">' +
      icoSvg(t.icon, 24, active ? C.accent : "var(--muted)", active) +
      '<span class="nav-label">'+t.label+'</span>';
    if (t.badge > 0) html += '<div class="nav-badge">'+t.badge+'</div>';
    html += '</button>';
  });
  html += '</div>';
  return html;
}

function bindGlobalHandlers() {
  appEl.querySelectorAll("[data-nav]").forEach(function(btn) {
    btn.addEventListener("click", function() {
      state.page = btn.getAttribute("data-nav");
      state.viewProfileId = null;
      state.postDetailId = null;
      state.followListFor = null;
      state.searchQuery = "";
      window.scrollTo(0,0);
      render();
    });
  });
  var newPostBtn = appEl.querySelector("[data-new-post]");
  if (newPostBtn) newPostBtn.addEventListener("click", function() {
    compose = { media:null, mediaType:null, loc:null };
    state.creating = true;
    render();
  });
}

// ─── STORIES ─────────────────────────────────────────────────
function allStoriesList() {
  // owners with at least 1 item; "me" first
  var mine = myStoryEntry();
  var list = [];
  list.push({ ownerId:ME_ID, own:true, empty: mine.items.length === 0 });
  STORIES.forEach(function(s) {
    if (s.ownerId === ME_ID) return; // already added above
    if (!s.items.length) return;
    list.push({ ownerId:s.ownerId, own:false, seenCount:s.seenCount });
  });
  return list;
}

function renderStories() {
  var list = allStoriesList();
  var html = '<div class="stories-wrap">';
  list.forEach(function(s, idx) {
    var u = USERS[s.ownerId];
    var entry = STORIES.find(function(x){ return x.ownerId === s.ownerId; });
    var totalItems = entry ? entry.items.length : 0;
    var fullySeen = entry ? entry.seenCount >= totalItems && totalItems > 0 : false;
    html += '<div class="story" data-story-ring="'+idx+'">' +
      '<div class="story-ring '+(fullySeen?"":"unseen")+'">' +
        '<div class="story-ring-inner">'+avatarHtml(u.avatar, 56)+'</div>' +
      '</div>';
    if (s.own) {
      html += '<div class="story-plus" data-add-story>'+icoSvg("plus",12,"#fff")+'</div>';
    }
    html += '<span class="story-name '+(fullySeen?"seen":"")+'">'+esc(s.own?"Você":u.name)+'</span></div>';
  });
  html += '</div>' +
    '<input type="file" id="story-file-input" accept="image/*,video/*" capture="environment" class="hidden">';
  return html;
}

function bindStoriesEvents() {
  var fileInput = appEl.querySelector("#story-file-input");
  appEl.querySelectorAll("[data-add-story]").forEach(function(btn) {
    btn.addEventListener("click", function(e) {
      e.stopPropagation();
      if (fileInput) fileInput.click();
    });
  });
  appEl.querySelectorAll("[data-story-ring]").forEach(function(ring) {
    ring.addEventListener("click", function(e) {
      if (e.target.closest("[data-add-story]")) return;
      var idx = parseInt(ring.getAttribute("data-story-ring"), 10);
      var list = allStoriesList();
      var entry = list[idx];
      if (entry.empty) {
        if (fileInput) fileInput.click();
        return;
      }
      state.viewingStoryIdx = idx;
      state.viewingStoryItemIdx = 0;
      render();
    });
  });
  if (fileInput) {
    fileInput.addEventListener("change", function() {
      var file = fileInput.files[0];
      if (!file) return;
      var isVideo = file.type.indexOf("video") === 0;
      var reader = new FileReader();
      reader.onload = function() {
        var mine = myStoryEntry();
        mine.items.push({ id:uid(), type:isVideo?"video":"image", src:reader.result, time:"agora", likes:[], comments:[] });
        showToast("Story publicado! 🎀 ("+mine.items.length+" hoje)");
        render();
      };
      reader.readAsDataURL(file);
    });
  }
}

// ─── STORY VIEWER ────────────────────────────────────────────
var storyViewerTimer = null;
function currentStoryOwnerEntry() {
  var list = allStoriesList();
  var entryMeta = list[state.viewingStoryIdx];
  if (!entryMeta) return null;
  var entry = STORIES.find(function(x){ return x.ownerId === entryMeta.ownerId; });
  return entry || null;
}

function renderStoryViewer() {
  var entry = currentStoryOwnerEntry();
  if (!entry || !entry.items.length) { return ""; }
  var u = USERS[entry.ownerId];
  var itemIdx = Math.min(state.viewingStoryItemIdx, entry.items.length-1);
  var item = entry.items[itemIdx];
  var isOwn = entry.ownerId === ME_ID;

  var mediaHtml = item.type === "video"
    ? '<video src="'+item.src+'" autoplay playsinline data-story-media></video>'
    : '<img src="'+item.src+'" alt="" data-story-media>';

  var segments = "";
  entry.items.forEach(function(it, i) {
    var filled = i < itemIdx ? "100%" : (i === itemIdx ? "0%" : "0%");
    segments += '<div class="story-segment"><div class="story-segment-fill" data-seg-fill="'+i+'" style="width:'+filled+';"></div></div>';
  });

  var liked = item.likes.indexOf(ME_ID) !== -1;
  var footer = isOwn
    ? '<div class="story-reply-row">' +
        '<span style="color:#fff;font-size:12.5px;flex:1;">'+icoSvg("heart",15,"#fff",true)+' '+item.likes.length+' curtidas · '+icoSvg("comment",15,"#fff")+' '+item.comments.length+' comentários</span>' +
        '<button class="story-action-btn" data-view-story-comments>'+icoSvg("comment",22,"#fff")+'</button>' +
      '</div>'
    : '<div class="story-reply-row">' +
        '<input class="story-reply-input" placeholder="Responder…" data-story-reply-input>' +
        '<button class="story-action-btn" data-like-story>'+icoSvg("heart",24,liked?C.pink:"#fff",liked)+'</button>' +
        '<button class="story-action-btn" data-view-story-comments>'+icoSvg("comment",24,"#fff")+'</button>' +
      '</div>';

  return '<div class="story-viewer fade-in">' +
    '<div class="story-segments">'+segments+'</div>' +
    '<div class="story-viewer-head" style="top:18px;">' +
      avatarHtml(u.avatar, 34) +
      '<span style="color:#fff;font-weight:700;font-size:13px;flex:1;">'+esc(isOwn?"Você":u.name)+' <span style="opacity:.7;font-weight:500;">· '+esc(item.time)+'</span></span>' +
      '<button class="icon-btn" data-close-story style="color:#fff;">'+icoSvg("close",22)+'</button>' +
    '</div>' +
    '<div class="story-viewer-media" data-story-tap>'+mediaHtml+'</div>' +
    footer +
  '</div>';
}

function bindStoryViewer() {
  var entry = currentStoryOwnerEntry();
  if (!entry) { state.viewingStoryIdx = null; return; }
  var itemIdx = Math.min(state.viewingStoryItemIdx, entry.items.length-1);
  var item = entry.items[itemIdx];
  var isOwn = entry.ownerId === ME_ID;

  var closeBtn = appEl.querySelector("[data-close-story]");
  if (closeBtn) closeBtn.addEventListener("click", closeStoryViewer);

  var tapArea = appEl.querySelector("[data-story-tap]");
  if (tapArea) tapArea.addEventListener("click", function(e) {
    if (e.target.tagName === "VIDEO") return;
    var rect = tapArea.getBoundingClientRect();
    var x = e.clientX - rect.left;
    if (x < rect.width/2) goToPrevStoryItem(); else goToNextStoryItem();
  });

  var likeBtn = appEl.querySelector("[data-like-story]");
  if (likeBtn) likeBtn.addEventListener("click", function() {
    var idx = item.likes.indexOf(ME_ID);
    if (idx === -1) item.likes.push(ME_ID); else item.likes.splice(idx,1);
    pauseStoryTimer();
    render();
  });

  var replyInput = appEl.querySelector("[data-story-reply-input]");
  if (replyInput) {
    replyInput.addEventListener("focus", pauseStoryTimer);
    replyInput.addEventListener("blur", resumeStoryTimerIfNeeded);
    replyInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && replyInput.value.trim()) {
        item.comments.push({ id:uid(), authorId:ME_ID, text:replyInput.value.trim(), time:"agora" });
        showToast("Resposta enviada! 💬");
        replyInput.value = "";
        render();
      }
    });
  }

  var viewCommentsBtn = appEl.querySelector("[data-view-story-comments]");
  if (viewCommentsBtn) viewCommentsBtn.addEventListener("click", function() {
    pauseStoryTimer();
    openStoryComments();
  });

  runStoryTimer(entry, itemIdx);

  if (!isOwn) entry.seenCount = Math.max(entry.seenCount, itemIdx+1);
}

function runStoryTimer(entry, itemIdx) {
  clearInterval(storyViewerTimer);
  var elapsed = 0;
  var duration = 5000;
  var fillEl = appEl.querySelector('[data-seg-fill="'+itemIdx+'"]');
  storyViewerTimer = setInterval(function() {
    if (state.storyPaused) return;
    elapsed += 100;
    var pct = Math.min(100, (elapsed/duration)*100);
    if (fillEl) fillEl.style.width = pct + "%";
    if (elapsed >= duration) {
      clearInterval(storyViewerTimer);
      goToNextStoryItem();
    }
  }, 100);
}
function pauseStoryTimer() { state.storyPaused = true; }
function resumeStoryTimerIfNeeded() { state.storyPaused = false; }

function goToNextStoryItem() {
  var entry = currentStoryOwnerEntry();
  if (!entry) return closeStoryViewer();
  if (state.viewingStoryItemIdx < entry.items.length - 1) {
    state.viewingStoryItemIdx++;
    render();
  } else {
    // move to next owner
    var list = allStoriesList();
    if (state.viewingStoryIdx < list.length - 1) {
      state.viewingStoryIdx++;
      state.viewingStoryItemIdx = 0;
      render();
    } else {
      closeStoryViewer();
    }
  }
}
function goToPrevStoryItem() {
  if (state.viewingStoryItemIdx > 0) {
    state.viewingStoryItemIdx--;
    render();
  } else if (state.viewingStoryIdx > 0) {
    state.viewingStoryIdx--;
    var entry = currentStoryOwnerEntry();
    state.viewingStoryItemIdx = entry ? entry.items.length - 1 : 0;
    render();
  }
}

function closeStoryViewer() {
  clearInterval(storyViewerTimer);
  state.viewingStoryIdx = null;
  state.viewingStoryItemIdx = 0;
  state.storyPaused = false;
  render();
}

// ─── STORY COMMENTS PANEL ─────────────────────────────────────
function openStoryComments() {
  var entry = currentStoryOwnerEntry();
  if (!entry) return;
  var itemIdx = Math.min(state.viewingStoryItemIdx, entry.items.length-1);
  var item = entry.items[itemIdx];
  var panel = document.createElement("div");
  panel.className = "story-comments-panel fade-in";
  panel.setAttribute("data-story-comments-panel","1");
  var commentsHtml = item.comments.length
    ? item.comments.map(function(c) {
        var u = USERS[c.authorId];
        return '<div class="comment-row" style="padding:0 16px;">' + avatarHtml(u.avatar,30) +
          '<div class="comment-bubble"><span class="comment-user">'+esc(u.name)+' </span>' +
          '<span class="comment-time">'+esc(c.time)+'</span><p class="comment-text">'+esc(c.text)+'</p></div></div>';
      }).join("")
    : '<div class="search-empty">Nenhuma resposta ainda.</div>';
  panel.innerHTML =
    '<div class="story-comments-box">' +
      '<div style="padding:14px 16px;border-bottom:1px solid var(--border);text-align:center;font-weight:700;font-size:14px;position:relative;">' +
        'Respostas' +
        '<button class="icon-btn" data-close-story-comments style="position:absolute;right:10px;top:8px;color:var(--muted);">'+icoSvg("close",20)+'</button>' +
      '</div>' +
      '<div style="overflow:auto;padding:10px 0;flex:1;">'+commentsHtml+'</div>' +
    '</div>';
  document.body.appendChild(panel);
  panel.addEventListener("click", function(e) { if (e.target === panel) closeStoryComments(); });
  panel.querySelector("[data-close-story-comments]").addEventListener("click", closeStoryComments);
}
function closeStoryComments() {
  var p = document.querySelector("[data-story-comments-panel]");
  if (p) p.remove();
  resumeStoryTimerIfNeeded();
}

// ─── POST CARD ───────────────────────────────────────────────
function renderPostCard(post, opts) {
  opts = opts || {};
  var author = USERS[post.authorId] || { name: "Usuário", username: "@usuario", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=" + post.authorId, verified: false };
  var mediaHtml = "";
  if (post.video) mediaHtml = '<video class="post-video" src="'+post.video+'" controls playsinline></video>';
  else if (post.img) mediaHtml = '<img class="post-img" src="'+post.img+'" alt="" data-open-post-media="'+post.id+'">';

  var locHtml = post.loc ? '<div class="post-loc">'+icoSvg("loc",13,C.accent)+' '+esc(post.loc)+'</div>' : "";
  var liked = postIsLiked(post);
  var commentCount = getComments(post.id).length;

  return '<div class="post-card" data-post-id="'+post.id+'">' +
    '<div class="post-head">' +
      '<div data-open-author="'+post.authorId+'" style="cursor:pointer;">'+avatarHtml(author.avatar, 42)+'</div>' +
      '<div class="grow" data-open-author="'+post.authorId+'" style="cursor:pointer;">' +
        '<div class="row" style="gap:4px;">' +
          '<span class="post-name">'+esc(author.name)+'</span>' +
          (author.verified ? verifiedBadge() : "") +
        '</div>' +
        '<div class="post-meta">' +
          '<span class="post-sub">'+esc(author.username)+'</span>' +
          '<span class="post-sub">·</span>' +
          '<span class="post-sub">'+esc(post.time)+'</span>' +
        '</div>' +
      '</div>' +
      '<button class="icon-btn" data-open-sheet="'+post.id+'" style="color:var(--muted);">'+icoSvg("more",20)+'</button>' +
    '</div>' +
    '<p class="post-text" '+(opts.noOpenText?"":'data-open-post="'+post.id+'" style="cursor:pointer;"')+'>'+esc(post.text)+'</p>' +
    locHtml +
    mediaHtml +
    '<div class="post-actions">' +
      '<button class="act-btn '+(liked?"liked":"")+'" data-like="'+post.id+'">'+icoSvg("heart",20,liked?C.pink:"var(--sub)",liked)+' <span data-like-count="'+post.id+'">'+fmtNum(postLikeCount(post))+'</span></button>' +
      '<button class="act-btn" data-toggle-comments="'+post.id+'">'+icoSvg("comment",20,"var(--sub)")+' '+fmtNum(commentCount)+'</button>' +
      '<button class="act-btn" data-share-post="'+post.id+'">'+icoSvg("share",20,"var(--sub)")+' '+fmtNum(postShareCount(post))+'</button>' +
      '<div style="margin-left:auto;">' +
        '<button class="act-btn '+(post.saved?"saved":"")+'" data-save="'+post.id+'">'+icoSvg("save",20,post.saved?C.accent:"var(--sub)",post.saved)+'</button>' +
      '</div>' +
    '</div>' +
    '<div class="comments-box '+(opts.commentsOpen?"":"hidden")+'" data-comments-box="'+post.id+'">' +
      renderCommentsList(post.id) +
      renderCommentInputRow(post.id) +
    '</div>' +
  '</div>';
}

function renderCommentInputRow(pid) {
  var replying = state.replyTarget && state.replyTarget.pid === pid ? state.replyTarget : null;
  var replyBanner = replying
    ? '<div style="display:flex;align-items:center;gap:6px;padding:4px 0 8px 38px;font-size:12px;color:var(--accent);">' +
        'Respondendo a '+esc(replying.authorName)+
        '<button data-cancel-reply style="background:none;border:none;color:var(--accent);cursor:pointer;display:flex;padding:0;">'+icoSvg("close",13)+'</button>' +
      '</div>'
    : "";
  return replyBanner +
    '<div class="comment-input-row">' +
      avatarHtml(ME.avatar, 30) +
      '<div class="row grow" style="gap:6px;">' +
        '<input class="comment-input" placeholder="'+(replying?"Responder…":"Comentar…")+'" data-comment-input="'+pid+'">' +
        '<button class="comment-send" data-add-comment="'+pid+'">'+icoSvg("send",16,"#fff")+'</button>' +
      '</div>' +
    '</div>';
}

function renderCommentsList(pid) {
  var cmts = getComments(pid);
  var topLevel = cmts.filter(function(c){ return !c.parentId; });
  var html = '<div data-comments-list="'+pid+'">';
  topLevel.forEach(function(c) { html += renderCommentItem(pid, c, cmts); });
  if (!topLevel.length) html += '<div class="search-empty" style="padding:20px 0;">Seja o primeiro a comentar! 🎀</div>';
  html += '</div>';
  return html;
}

function renderCommentItem(pid, c, allCmts) {
  var u = USERS[c.authorId];
  var liked = commentIsLiked(c);
  var replies = allCmts.filter(function(r){ return r.parentId === c.id; });
  var html = '<div class="comment-row" data-comment-id="'+c.id+'">' +
    '<div data-open-author="'+c.authorId+'" style="cursor:pointer;">'+avatarHtml(u.avatar, 30)+'</div>' +
    '<div class="comment-bubble">' +
      '<div data-open-author="'+c.authorId+'" style="cursor:pointer;display:inline;"><span class="comment-user">'+esc(u.name)+' </span></div>' +
      '<span class="comment-time">'+esc(c.time)+'</span>' +
      '<p class="comment-text">'+esc(c.text)+'</p>' +
      '<div style="display:flex;gap:14px;margin-top:4px;">' +
        '<button data-like-comment="'+pid+':'+c.id+'" style="background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:center;gap:4px;color:'+(liked?C.pink:"var(--muted)")+';font-size:11.5px;font-weight:700;">'+icoSvg("heart",13,liked?C.pink:"var(--muted)",liked)+' '+commentLikeCount(c)+'</button>' +
        '<button data-reply-comment="'+pid+':'+c.id+'" style="background:none;border:none;cursor:pointer;padding:0;color:var(--muted);font-size:11.5px;font-weight:700;">Responder</button>' +
        '<button data-report-comment="'+pid+':'+c.id+'" style="background:none;border:none;cursor:pointer;padding:0;color:var(--muted);font-size:11.5px;font-weight:700;">Reportar</button>' +
      '</div>' +
    '</div>' +
  '</div>';
  if (replies.length) {
    html += '<div style="margin-left:38px;">';
    replies.forEach(function(r) { html += renderCommentItem(pid, r, allCmts); });
    html += '</div>';
  }
  return html;
}

// ─── FEED PAGE ───────────────────────────────────────────────
function renderFeedPage() {
  // Carrega autores desconhecidos do Firebase em background
  if (_idToken) {
    posts.forEach(function(p) {
      if (!USERS[p.authorId]) {
        fsGet("users/" + p.authorId).then(function(u) {
          if (u) { delete u._id; u.uid = p.authorId; USERS[p.authorId] = u; render(); }
        }).catch(function(){});
      }
    });
  }
  var html = '<div class="page-header row" style="justify-content:space-between;">' +
    '<div class="row" style="gap:8px;">' +
      '<div style="width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,'+C.accent+',#ffa6c9);display:flex;align-items:center;justify-content:center;">'+icoSvg("heartLogo",18,"#fff",true)+'</div>' +

function bindPostCardEvents() {
  appEl.querySelectorAll("[data-open-author]").forEach(function(el) {
    el.addEventListener("click", function(e) {
      e.stopPropagation();
      openProfile(el.getAttribute("data-open-author"));
    });
  });
  appEl.querySelectorAll("[data-open-post], [data-open-post-media]").forEach(function(el) {
    el.addEventListener("click", function(e) {
      e.stopPropagation();
      openPostDetail(el.getAttribute("data-open-post") || el.getAttribute("data-open-post-media"));
    });
  });
  appEl.querySelectorAll("[data-open-sheet]").forEach(function(btn) {
    btn.addEventListener("click", function(e) {
      e.stopPropagation();
      state.actionSheetPostId = btn.getAttribute("data-open-sheet");
      render();
    });
  });
  appEl.querySelectorAll("[data-like]").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var pid = btn.getAttribute("data-like");
      var post = posts.find(function(p){ return p.id === pid; });
      if (!post) return;
      var idx = post.likedBy.indexOf(ME_ID);
      if (idx === -1) {
        post.likedBy.push(ME_ID);
        // Notifica o dono do post que alguém curtiu
        if (post.authorId !== ME_ID) {
          addNotif("like", ME_ID, "curtiu sua publicação");
          FB.pushNotif(post.authorId, "like", "curtiu sua publicação");
        }
      } else {
        post.likedBy.splice(idx,1);
      }
      FB.likePost(pid, idx === -1);
      render();
    });
  });
  appEl.querySelectorAll("[data-save]").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var pid = btn.getAttribute("data-save");
      var post = posts.find(function(p){ return p.id === pid; });
      if (!post) return;
      post.saved = !post.saved;
      showToast(post.saved ? "Salvo! 📌" : "Removido dos salvos");
      render();
    });
  });
  appEl.querySelectorAll("[data-share-post]").forEach(function(btn) {
    btn.addEventListener("click", function(e) { e.stopPropagation(); showToast("Link copiado! 🔗"); });
  });
  appEl.querySelectorAll("[data-toggle-comments]").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var pid = btn.getAttribute("data-toggle-comments");
      var box = appEl.querySelector('[data-comments-box="'+pid+'"]');
      if (box) box.classList.toggle("hidden");
    });
  });
  bindCommentEvents();
}

function bindCommentEvents() {
  appEl.querySelectorAll("[data-add-comment]").forEach(function(btn) {
    btn.addEventListener("click", function() { addComment(btn.getAttribute("data-add-comment")); });
  });
  appEl.querySelectorAll("[data-comment-input]").forEach(function(input) {
    input.addEventListener("keydown", function(e) {
      if (e.key === "Enter") addComment(input.getAttribute("data-comment-input"));
    });
  });
  appEl.querySelectorAll("[data-like-comment]").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var parts = btn.getAttribute("data-like-comment").split(":");
      var cmts = getComments(parts[0]);
      var c = cmts.find(function(x){ return x.id === parts[1]; });
      if (!c) return;
      var idx = c.likedBy.indexOf(ME_ID);
      if (idx === -1) c.likedBy.push(ME_ID); else c.likedBy.splice(idx,1);
      render();
    });
  });
  appEl.querySelectorAll("[data-reply-comment]").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var parts = btn.getAttribute("data-reply-comment").split(":");
      var cmts = getComments(parts[0]);
      var c = cmts.find(function(x){ return x.id === parts[1]; });
      if (!c) return;
      state.replyTarget = { pid:parts[0], commentId:c.id, authorName:USERS[c.authorId].name };
      render();
      var input = appEl.querySelector('[data-comment-input="'+parts[0]+'"]');
      if (input) input.focus();
    });
  });
  appEl.querySelectorAll("[data-cancel-reply]").forEach(function(btn) {
    btn.addEventListener("click", function() { state.replyTarget = null; render(); });
  });
  appEl.querySelectorAll("[data-report-comment]").forEach(function(btn) {
    btn.addEventListener("click", function() { showToast("Comentário reportado. Vamos analisar. 🙏"); });
  });
}

function addComment(pid) {
  var input = appEl.querySelector('[data-comment-input="'+pid+'"]');
  if (!input) return;
  var text = input.value.trim();
  if (!text) return;
  var cmts = getComments(pid);
  var parentId = (state.replyTarget && state.replyTarget.pid === pid) ? state.replyTarget.commentId : null;
  cmts.push({ id:uid(), authorId:ME_ID, text:text, time:"agora", likedBy:[], parentId:parentId });

  // Notificação: comentário na publicação de outra pessoa
  var post = posts.find(function(p){ return p.id === pid; });
  if (post && post.authorId !== ME_ID) {
    var cmtText = 'comentou: "' + text.slice(0,40) + (text.length>40?"…":"") + '"';
    addNotif("comment", ME_ID, cmtText, post.authorId);
    FB.pushNotif(post.authorId, "comment", cmtText);
  }
  // Notificação: menção (@usuario)
  var mentions = text.match(/@(\w+)/g);
  if (mentions) {
    mentions.forEach(function(m) {
      var uname = m.toLowerCase();
      var mentioned = Object.values(USERS).find(function(u){ return (u.username||"").toLowerCase() === uname || (u.username||"").toLowerCase() === uname.slice(1); });
      if (mentioned && mentioned.uid !== ME_ID) {
        addNotif("mention", ME_ID, "te mencionou em um comentário", mentioned.uid);
        FB.pushNotif(mentioned.uid, "mention", "te mencionou em um comentário");
      }
    });
  }

  state.replyTarget = null;
  var box = appEl.querySelector('[data-comments-box="'+pid+'"]');
  var wasOpen = box && !box.classList.contains("hidden");
  render();
  if (wasOpen) {
    var newBox = appEl.querySelector('[data-comments-box="'+pid+'"]');
    if (newBox) newBox.classList.remove("hidden");
  }
}

function renderSearchResults(q) {
  var qLower = q.toLowerCase();
  // Inclui utilizadores locais (demo) E utilizadores reais já carregados
  var userResults = Object.values(USERS).filter(function(u) {
    if (!u || !u.name) return false;
    return (u.name||"").toLowerCase().indexOf(qLower) !== -1 ||
           (u.username||"").toLowerCase().indexOf(qLower) !== -1;
  });
  var postResults = posts.filter(function(p) {
    return (p.text||"").toLowerCase().indexOf(qLower) !== -1;
  });

  // Busca no Firestore em paralelo e re-renderiza quando chegar
  if (_idToken && q.length >= 2) {
    FB.searchUsers(q).then(function(found) {
      var changed = false;
      found.forEach(function(u) {
        if (!USERS[u._id || u.uid]) {
          var id = u._id || u.uid;
          delete u._id;
          u.uid = id;
          USERS[id] = u;
          changed = true;
        }
      });
      if (changed) render();
    });
  }

  if (!userResults.length && !postResults.length) {
    return '<div class="search-empty">Nenhum resultado para "'+esc(q)+'".<br>Tente buscar por nome, @usuário ou palavra-chave.</div>';
  }

  var html = '<div class="search-results">';
  if (userResults.length) {
    html += '<div class="search-section-title">Perfis</div>';
    userResults.forEach(function(u) {
      html += '<div class="follow-row" data-open-author="'+(u.uid||u._id)+'">' + avatarHtml(u.avatar||"https://api.dicebear.com/7.x/avataaars/svg?seed="+(u.uid||"x"),46) +
        '<div class="follow-row-info"><div class="follow-row-name">'+esc(u.name)+(u.verified?verifiedBadge(13):"")+'</div>' +
        '<div class="follow-row-username">'+esc(u.username||"")+'</div></div></div>';
    });
  }
  if (postResults.length) {
    html += '<div class="search-section-title">Publicações</div>';
    postResults.forEach(function(p) {
      var author = USERS[p.authorId] || { name: "Utilizador", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=x" };
      html += '<div class="follow-row" data-open-post="'+p.id+'">' + avatarHtml(author.avatar,40) +
        '<div class="follow-row-info"><div class="follow-row-name">'+esc(author.name)+'</div>' +
        '<div class="follow-row-username" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(p.text||"")+'</div></div></div>';
    });
  }
  html += '</div>';
  return html;
}

}

function renderChatBubbleContent(m) {
  if (m.type === "image") return '<img class="bubble-img" src="'+m.src+'" alt="">';
  if (m.type === "video") return '<video class="bubble-video" src="'+m.src+'" controls playsinline></video>';
  if (m.type === "audio") {
    var dur = m.duration || 0;
    var mm = Math.floor(dur/60), ss = String(Math.floor(dur%60)).padStart(2,"0");
    var bars = "";
    for (var i=0;i<18;i++) {
      var h = 6 + Math.round(Math.sin(i*1.3)*6) + 6;
      bars += '<span style="height:'+h+'px;background:'+(m.me?'rgba(255,255,255,.7)':'var(--accent)')+';"></span>';
    }
    return '<div class="audio-msg">' +
      '<button class="audio-play-btn" data-play-audio="'+m.id+'" style="background:'+(m.me?'rgba(255,255,255,.25)':'#fff0f6')+';color:'+(m.me?'#fff':'var(--accent)')+';">'+icoSvg("play",14,m.me?"#fff":C.accent,true)+'</button>' +
      '<div class="audio-wave">'+bars+'</div>' +
      '<span style="font-size:11px;color:'+(m.me?'rgba(255,255,255,.8)':'var(--muted)')+';">'+mm+':'+ss+'</span>' +
      '<audio data-audio-el="'+m.id+'" src="'+m.src+'" preload="metadata"></audio>' +
    '</div>';
  }
  return esc(m.text);
}

      render();
      scrollChatToBottom();

                id: m._id, _firestoreId: m._id,

                src: m.img || m.audio || null,

    chatInput.addEventListener("input", function() {

          _isTyping = true;

          setTimeout(function() {
            _isTyping = false;

  var userSearchInput = appEl.querySelector("[data-user-search-input]");

    userSearchInput.addEventListener("input", function() {

      state.userSearchQuery = q;

      // Mostra imediatamente "A pesquisar…" sem reconstruir a página

          var box = appEl.querySelector("[data-search-results-box]");

            return '<div class="follow-row" data-start-convo-inline="'+u.uid+'" style="cursor:pointer;">' +
              avatarHtml(u.avatar||"https://api.dicebear.com/7.x/avataaars/svg?seed="+u.uid, 42) +
              '<div class="follow-row-info">' +
                '<div class="follow-row-name">'+esc(u.name)+'</div>' +
                '<div class="follow-row-username">'+esc(u.username||"")+'</div>' +

              '<button class="follow-btn not-following">Conversar</button>' +
            '</div>';

          // Bind inline sem re-render
          box.querySelectorAll("[data-start-convo-inline]").forEach(function(row) {

              var targetUid = row.getAttribute("data-start-convo-inline");

                state.userSearchOpen = false;
                state.userSearchQuery = "";
                state.userSearchResults = [];
                state.activeConvoId = convoId;
                startChatPolling();
                render();
                scrollChatToBottom();
              });
            });
          });
        }).catch(function() {

          if (box) box.innerHTML = '<p style="text-align:center;color:#e0507a;padding:16px;font-size:13px;">Erro na pesquisa. Verifica a ligação.</p>';
        });
      }, 400);
    });
  }

  appEl.querySelectorAll("[data-start-convo]").forEach(function(btn) {
    btn.addEventListener("click", function(e) {
      e.stopPropagation();
      var targetUid = btn.getAttribute("data-start-convo");
      FB.getOrCreateConvo(targetUid).then(function(convoId) {
        state.userSearchOpen = false;
        state.userSearchQuery = "";
        state.userSearchResults = [];
        state.activeConvoId = convoId;
        startChatPolling();
        render();
        scrollChatToBottom();
      });
    });
  });

  bindAudioPlayback();
  if (state.activeConvoId) {
    scrollChatToBottom();
    startChatPolling();
  }
}

function bindAudioPlayback() {
  appEl.querySelectorAll("[data-play-audio]").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var id = btn.getAttribute("data-play-audio");
      var audioEl = appEl.querySelector('[data-audio-el="'+id+'"]');
      if (!audioEl) return;
      if (audioEl.paused) {
        appEl.querySelectorAll("audio").forEach(function(a){ if (a!==audioEl) a.pause(); });
        audioEl.play();
        btn.innerHTML = icoSvg("pause",14, btn.style.color || C.accent, true);
      } else {
        audioEl.pause();
        btn.innerHTML = icoSvg("play",14, btn.style.color || C.accent, true);
      }
      audioEl.onended = function() { btn.innerHTML = icoSvg("play",14, btn.style.color || C.accent, true); };
    });
  });
}

function sendChatMessage() {
  var input = appEl.querySelector("[data-chat-input]");
  if (!input) return;
  var text = input.value.trim();
  if (!text) return;
  input.value = "";
  var localId = uid();
  var chat = getChat(state.activeConvoId);
  var msgObj = { id:localId, _firestoreId: null, me:true, type:"text", text:text, time:nowTime() };
  chat.push(msgObj);
  var conv = CONVOS.find(function(c){ return c.id === state.activeConvoId; });
  if (conv) { conv.last = text; conv.time = "agora"; }
  render();
  scrollChatToBottom();
  // persiste no Firestore e marca com o ID real para o polling não duplicar
  if (_idToken) {
    FB.sendMessage(state.activeConvoId, { type:"text", text:text }).then(function(doc){
      if (doc && doc.name) {
        var fsId = doc.name.split("/").pop();
        msgObj._firestoreId = fsId;
        // atualiza lastMsg da conversa
        var _conv = CONVOS.find(function(c){ return c.id === state.activeConvoId; });
        var _members = _conv && _conv.userId ? [ME_ID, _conv.userId] : [ME_ID];
        fsSet("convos/"+ state.activeConvoId, { lastMsg: text, lastTime: new Date().toISOString(), members: _members });
      }
    }).catch(function(){});
  }
}

function scrollChatToBottom() {
  setTimeout(function() {
    var box = appEl.querySelector("[data-chat-msgs]");
    if (box) box.scrollTop = box.scrollHeight;
  }, 0);
}

// ─── AUDIO RECORDING ──────────────────────────────────────────
function startAudioRecording() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showToast("Microfone não disponível neste dispositivo/navegador.");
    return;
  }
  navigator.mediaDevices.getUserMedia({ audio:true }).then(function(stream) {
    recordingStream = stream;
    recordedChunks = [];
    try {
      mediaRecorder = new MediaRecorder(stream);
    } catch (e) {
      showToast("Gravação de áudio não suportada aqui.");
      stream.getTracks().forEach(function(t){ t.stop(); });
      return;
    }
    mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = function() {
      var blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || "audio/webm" });
      var duration = Math.round((Date.now() - recordingStartTime) / 1000);
      var reader = new FileReader();
      reader.onload = function() {
        var chat = getChat(state.activeConvoId);
        chat.push({ id:uid(), me:true, type:"audio", src:reader.result, duration:duration, time:nowTime() });
        var conv = CONVOS.find(function(c){ return c.id === state.activeConvoId; });
        if (conv) { conv.last = "🎤 Áudio"; conv.time = "agora"; }
        render();
        scrollChatToBottom();
      };
      reader.readAsDataURL(blob);
      recordingStream.getTracks().forEach(function(t){ t.stop(); });
    };
    mediaRecorder.start();
    recordingStartTime = Date.now();
    showRecordingUI();
  }).catch(function() {
    showToast("Não foi possível acessar o microfone. Verifique a permissão.");
  });
}

function stopAudioRecording() {
  if (mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop();
  hideRecordingUI();
}

function showRecordingUI() {
  var row = appEl.querySelector("[data-chat-input-row]");
  if (!row) return;
  var indicator = document.createElement("div");
  indicator.className = "rec-indicator";
  indicator.setAttribute("data-rec-indicator","1");
  indicator.innerHTML =
    '<div class="rec-dot"></div>' +
    '<span style="font-size:13px;color:var(--text);flex:1;">Gravando áudio…</span>' +
    '<button class="icon-btn" data-cancel-rec style="color:var(--muted);">'+icoSvg("trash",20)+'</button>' +
    '<button class="chat-send" data-stop-rec>'+icoSvg("send",18,"#fff")+'</button>';
  row.appendChild(indicator);
  indicator.querySelector("[data-stop-rec]").addEventListener("click", stopAudioRecording);
  indicator.querySelector("[data-cancel-rec]").addEventListener("click", function() {
    if (mediaRecorder) {
      mediaRecorder.onstop = function() { recordingStream.getTracks().forEach(function(t){ t.stop(); }); };
      mediaRecorder.stop();
    }
    hideRecordingUI();
  });
}
function hideRecordingUI() {
  var indicator = appEl.querySelector("[data-rec-indicator]");
  if (indicator) indicator.remove();
}

// ─── CALLS (simulated) ────────────────────────────────────────
function startCall(type) {
  var conv = CONVOS.find(function(c){ return c.id === state.activeConvoId; });
  if (!conv) return;
  activeCall = { conv:conv, type:type, status:"calling", seconds:0, muted:false };
  render();
  setTimeout(function() {
    if (!activeCall) return;
    activeCall.status = "connected";
    render();
    startCallTimer();
  }, 1800);
}

function startCallTimer() {
  clearInterval(callTimerInterval);
  callTimerInterval = setInterval(function() {
    if (!activeCall) { clearInterval(callTimerInterval); return; }
    activeCall.seconds++;
    var el = document.querySelector("[data-call-timer]");
    if (el) el.textContent = formatCallTime(activeCall.seconds);
  }, 1000);
}

function formatCallTime(s) {
  var mm = Math.floor(s/60), ss = String(s%60).padStart(2,"0");
  return String(mm).padStart(2,"0")+":"+ss;
}

function renderCallScreen() {
  var conv = activeCall.conv;
  var u = USERS[conv.userId];
  var statusText = activeCall.status === "calling" ? "Chamando…" : formatCallTime(activeCall.seconds);
  return '<div class="call-screen fade-in">' +
    '<div class="call-status">' +
      '<p class="call-sub">'+(activeCall.type==="video"?"Chamada de vídeo":"Chamada de voz")+'</p>' +
    '</div>' +
    '<div class="call-avatar-wrap">' +
      '<div style="width:110px;height:110px;border-radius:50%;overflow:hidden;border:3px solid rgba(255,255,255,.3);'+(activeCall.status==="calling"?"animation:pulse 1.6s infinite;":"")+'">' +
        '<img src="'+u.avatar+'" style="width:100%;height:100%;object-fit:cover;">' +
      '</div>' +
      '<div><p class="call-name">'+esc(u.name)+'</p><p class="call-sub" data-call-timer>'+statusText+'</p></div>' +
    '</div>' +
    '<div class="call-controls">' +
      '<button class="call-ctrl-btn '+(activeCall.muted?"active":"")+'" data-toggle-mute>'+icoSvg(activeCall.muted?"micOff":"mic",24)+'</button>' +
      '<button class="call-end-btn" data-end-call>'+icoSvg("phone",26,"#fff",true)+'</button>' +
      '<button class="call-ctrl-btn" data-toggle-speaker>'+icoSvg(activeCall.type==="video"?"videoCall":"phone",24)+'</button>' +
    '</div>' +
  '</div>';
}

function bindCallScreen() {
  var endBtn = document.querySelector("[data-end-call]");
  if (endBtn) endBtn.addEventListener("click", endCall);
  var muteBtn = document.querySelector("[data-toggle-mute]");
  if (muteBtn) muteBtn.addEventListener("click", function() {
    activeCall.muted = !activeCall.muted;
    render();
  });
  var spkBtn = document.querySelector("[data-toggle-speaker]");
  if (spkBtn) spkBtn.addEventListener("click", function() { showToast("Alto-falante alternado"); });
}

function endCall() {
  clearInterval(callTimerInterval);
  activeCall = null;
  render();
}

// ─── PROFILE PAGE ────────────────────────────────────────────
var profileTab = "posts";

function profileTabItems(userId, tab) {
  if (tab === "posts") return userPosts(userId); // todos os posts, com ou sem mídia
  if (tab === "mídia") return userPosts(userId).filter(function(p){ return p.img || p.video; });
  if (tab === "curtidas") return posts.filter(function(p){ return p.likedBy.indexOf(userId) !== -1 && (p.img||p.video); });
  if (tab === "salvos") return userId===ME_ID ? posts.filter(function(p){ return p.saved && (p.img||p.video); }) : [];
  return [];
}

function renderProfilePage(userId) {
  var u = USERS[userId];
  if (!u) return '<div class="search-empty">Perfil não encontrado.</div>';
  var isMe = userId === ME_ID;
  var tabs = isMe ? ["posts","mídia","curtidas","salvos"] : ["posts","mídia","curtidas"];
  if (!tabs.indexOf || tabs.indexOf(profileTab) === -1) profileTab = "posts";

  var coverStyle = u.cover ? 'background-image:url('+u.cover+');background-size:cover;background-position:center;' : '';
  var backBtn = !isMe ? '<button class="icon-btn" data-back-profile style="position:absolute;top:12px;left:12px;background:rgba(255,255,255,.35);border-radius:50%;color:#fff;z-index:2;">'+icoSvg("back",20,"#fff")+'</button>' : "";
  var coverBtn = isMe ? '<button class="profile-cover-btn" data-edit-cover>'+icoSvg("edit",13,"#fff")+' Editar capa</button>' : "";

  var actionBtns = isMe
    ? '<button class="btn btn-sm btn-secondary" data-edit-profile>'+icoSvg("edit",15)+' Editar</button>' +
      '<button class="btn btn-sm btn-secondary" data-share-profile>'+icoSvg("share",15)+'</button>'
    : (isFollowing(userId)

          (u.website ? '<div class="profile-meta-item">'+icoSvg("globe",13,C.accent)+'<span>'+esc(u.website)+'</span></div>' : "") +
          '<div class="profile-meta-item">'+icoSvg("bell",13,C.accent)+'<span>Entrou '+esc(u.joined)+'</span></div>' +
        '</div>' +
        '<div class="profile-stats">' +
          '<div><div class="profile-stat-num">'+fmtNum(postCount)+'</div><div class="profile-stat-label">posts</div></div>' +
          '<div data-open-followlist="'+userId+':followers" style="cursor:pointer;"><div class="profile-stat-num">'+fmtNum(u.followers.length)+'</div><div class="profile-stat-label">seguidores</div></div>' +

      html += '<div>';

    html += '<div style="padding:16px;"><button class="btn btn-full btn-danger" data-logout>'+icoSvg("logout",18,"#e0507a")+' Sair da conta</button></div>';

function bindEditProfile() {
  var closeBtn = appEl.querySelector("[data-close-edit]");

  var avatarInput = appEl.querySelector("[data-edit-avatar-input]");

  if (coverBtn) coverBtn.addEventListener("click", function() { if (coverInput) coverInput.click(); });
  if (avatarInput) avatarInput.addEventListener("change", function() {
    var file = avatarInput.files[0]; if (!file) return;
    var reader = new FileReader();
    reader.onload = function() { ME_obj().avatar = reader.result; render(); state.editProfileOpen = true; render(); };
    reader.readAsDataURL(file);
  });
  if (coverInput) coverInput.addEventListener("change", function() {
    var file = coverInput.files[0]; if (!file) return;
    var reader = new FileReader();
    reader.onload = function() { ME_obj().cover = reader.result; state.editProfileOpen = true; render(); };
    reader.readAsDataURL(file);
  });

  var saveBtn = appEl.querySelector("[data-save-edit]");
  if (saveBtn) saveBtn.addEventListener("click", function() {
    var u = ME_obj();
    var nameEl = appEl.querySelector('[data-edit-field="name"]');
    var userEl = appEl.querySelector('[data-edit-field="username"]');
    var bioEl  = appEl.querySelector('[data-edit-field="bio"]');
    var locEl  = appEl.querySelector('[data-edit-field="location"]');
    var webEl  = appEl.querySelector('[data-edit-field="website"]');
    if (nameEl && nameEl.value.trim()) u.name     = nameEl.value.trim();
    if (userEl && userEl.value.trim()) u.username = userEl.value.trim().replace(/^@?/, "@");
    if (bioEl) u.bio      = bioEl.value.trim();
    if (locEl) u.location = locEl.value.trim();
    if (webEl) u.website  = webEl.value.trim();
    USERS[ME_ID] = u;
    state.editProfileOpen = false;
    render();
    // persiste no Firestore (remove _id que é só uso interno)
    if (_idToken) {
      var toSave = {};
      Object.keys(u).forEach(function(k){ if (k !== "_id") toSave[k] = u[k]; });
      fsSet("users/"+ME_ID, toSave).then(function(){
        showToast("Perfil atualizado! 🎀");
      }).catch(function(){
        showToast("Erro ao salvar. Tenta novamente.");
      });
    } else {
      showToast("Perfil atualizado localmente.");
    }
  });
}

function renderEmojiPanel() {
  var grid = EMOJIS.map(function(e){ return '<button data-emoji-pick="'+e+'">'+e+'</button>'; }).join("");
  return '<div class="emoji-panel" data-emoji-panel><div class="emoji-grid">'+grid+'</div></div>';
}

function toggleEmojiPanel(target) {
  var existing = document.querySelector("[data-emoji-panel]");
  if (existing) {
    existing.remove();
    if (state.emojiTarget === target) { state.emojiTarget = null; return; }
  }
  state.emojiTarget = target;
  var anchor = target === "create"
    ? document.querySelector(".create-toolbar")
    : document.querySelector("[data-chat-input-row]");
  if (!anchor) return;
  anchor.style.position = "relative";
  var panel = document.createElement("div");
  panel.innerHTML = renderEmojiPanel();
  var panelEl = panel.firstChild;
  anchor.appendChild(panelEl);
  panelEl.querySelectorAll("[data-emoji-pick]").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var emoji = btn.getAttribute("data-emoji-pick");
      var inputEl = target === "create"
        ? document.querySelector("[data-post-text]")
        : document.querySelector("[data-chat-input]");
      if (inputEl) {
        var start = inputEl.selectionStart || inputEl.value.length;
        var end = inputEl.selectionEnd || inputEl.value.length;
        inputEl.value = inputEl.value.slice(0,start) + emoji + inputEl.value.slice(end);
        inputEl.focus();
        inputEl.selectionStart = inputEl.selectionEnd = start + emoji.length;
        inputEl.dispatchEvent(new Event("input"));
      }
    });
  });
}
